server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/html/wordpress;
    index index.php;

    # Логи
    access_log /var/log/angie/example.com.access.log;
    error_log /var/log/angie/example.com.error.log;

    # Постоянные ссылки WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Обработка PHP
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
    }

    # Безопасность: запрет выполнения php в uploads
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    # Запрет доступа к скрытым файлам (.htaccess, .git и т.д.)
    location ~ /\. {
        deny all;
    }
}
